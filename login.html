<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Taxgini</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/optimize.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <div class="auth-container">
        <div class="glass auth-card fade-in">
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>

            <div class="logo" style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2.5rem; justify-content: center;">
                <div style="width: 40px; height: 40px; background: var(--secondary); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--primary-dark); font-weight: 800; font-size: 1.5rem;">T</div>
                <span style="font-size: 1.75rem; font-weight: 700; letter-spacing: -1px;">Taxgini<span style="color: var(--secondary);">.</span></span>
            </div>

            <h3 id="authTitle" style="margin-bottom: 1.5rem; text-align: center;">Login to Dashboard</h3>

            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" class="input" id="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group" id="passwordGroup">
                    <label id="passLabel">Password</label>
                    <input type="password" class="input" id="password" placeholder="••••••••" required>
                </div>

                <div id="loginAddons" style="text-align: right; margin-top: -1rem; margin-bottom: 1.5rem;">
                   <span style="font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; text-decoration: underline;" id="forgotBtn">Forgot Password?</span>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="submitBtn">Login Now</button>
            </form>

            <p style="margin-top: 2rem; text-align: center; color: var(--text-secondary); font-size: 0.9rem;" id="footerText">
                Don't have an account? <a href="register.html" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>

    <script type="module">
        import Taxgini from './js/function.js';
        import Storage from './js/storage.js';
        
        const loginForm = document.getElementById('loginForm');
        const forgotBtn = document.getElementById('forgotBtn');
        const authTitle = document.getElementById('authTitle');
        const submitBtn = document.getElementById('submitBtn');
        const loginAddons = document.getElementById('loginAddons');
        const passLabel = document.getElementById('passLabel');
        const footerText = document.getElementById('footerText');

        let isForgotMode = false;

        forgotBtn.onclick = () => {
            isForgotMode = !isForgotMode;
            if (isForgotMode) {
                authTitle.textContent = 'Account Recovery';
                passLabel.textContent = 'Set New Password';
                submitBtn.textContent = 'Reset Password';
                loginAddons.style.display = 'none';
                footerText.innerHTML = '<span style="color: var(--text-secondary); cursor: pointer;" onclick="location.reload()"><i class="fas fa-arrow-left"></i> Back to Login</span>';
            }
        };

        loginForm.onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isForgotMode) {
                const res = Storage.resetPassword(email, password);
                if (res.success) {
                    Taxgini.notify('Password reset successful! Please login.', 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    Taxgini.notify(res.message, 'error');
                }
            } else {
                const res = Storage.login(email, password);
                if (res.success) {
                    window.location.href = res.user.type === 'ca' ? 'ca-dashboard.html' : 'client-dashboard.html';
                } else {
                    Taxgini.notify(res.message, 'error');
                }
            }
        };

        // Redirect if already logged in
        if (Storage.getCurrentUser()) {
            const user = Storage.getCurrentUser();
            window.location.href = user.type === 'ca' ? 'ca-dashboard.html' : 'client-dashboard.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Dashboard | Taxgini Marketplace</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/optimize.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .lead-detail-locked {
            filter: blur(4px);
            user-select: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>

    <header id="main-header"></header>

    <div class="dash-layout container">
        <aside class="sidebar glass">
            <div style="margin-bottom: 3rem;">
                <div style="color: var(--secondary); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 0.5rem;">DASHBOARD</div>
                <h3 style="font-size: 1.25rem;">CA Dashboard</h3>
            </div>
            
            <nav style="display: flex; flex-direction: column; gap: 1rem;">
                <a href="ca-dashboard.html" class="nav-item active glass-pill" style="display: flex; align-items: center; text-decoration: none;"><i class="fas fa-home" style="margin-right: 0.75rem;"></i> Overview</a>
                <a href="Leads.html" class="nav-item glass-pill" style="display: flex; align-items: center; text-decoration: none;"><i class="fas fa-store" style="margin-right: 0.75rem;"></i> Browse Leads</a>
                <a href="wallet.html" class="nav-item glass-pill" style="display: flex; align-items: center; text-decoration: none;"><i class="fas fa-wallet" style="margin-right: 0.75rem;"></i> My Wallet</a>
            </nav>
 
            <div style="margin-top: auto; padding-top: 3rem; border-top: 1px solid rgba(255,255,255,0.05);">
                <a href="https://wa.me/918051648462" class="btn btn-outline" style="width: 100%; border-color: var(--secondary); color: var(--secondary); margin-bottom: 1.5rem; font-size: 0.85rem; justify-content: flex-start;">
                    <i class="fas fa-headset" style="margin-right: 0.5rem;"></i> Live Support
                </a>
                
                <div style="font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 2rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <i class="fas fa-shield-alt" style="color: var(--success);"></i> ISO 27001 Certified
                    </div>
                </div>
 
                <button id="logoutBtn" class="nav-item" style="color: #ef4444; width: 100%; border: none; background: transparent; cursor: pointer; text-align: left; display: flex; align-items: center; padding: 0.5rem 0;">
                    <i class="fas fa-sign-out-alt" style="margin-right: 0.75rem;"></i> Logout
                </button>
            </div>
        </aside>
 
        <main class="main-content">
            <header style="margin-bottom: 3rem;">
                <h2 class="title-gradient" id="welcomeUser">CA Marketplace</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Grow your practice with premium verified leads.</p>
            </header>
 
            <div id="marketplaceView">
                <div class="stats-grid">
                    <div class="glass stat-card" style="border-left: 4px solid var(--secondary);">
                        <div style="color: var(--text-secondary); font-size: 0.85rem;">Marketplace Leads</div>
                        <div class="value" id="availCount">0</div>
                        <a href="Leads.html" style="font-size: 0.75rem; color: var(--secondary); text-decoration: none;">Browse Leads <i class="fas fa-arrow-right"></i></a>
                    </div>
                    <div class="glass stat-card" style="border-left: 4px solid var(--success);">
                        <div style="color: var(--text-secondary); font-size: 0.85rem;">Wallet Balance</div>
                        <div class="value" id="walletBalance">₹0</div>
                    </div>
                    <div class="glass stat-card" style="border-left: 4px solid var(--primary-light);">
                        <div style="color: var(--text-secondary); font-size: 0.85rem;">Active Leads</div>
                        <div class="value">24</div>
                    </div>
                </div>
 
                <div class="glass" style="padding: clamp(1.5rem, 5vw, 2.5rem); min-height: 400px;">
                    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                         <h3 style="margin-bottom: 0;">Featured Leads</h3>
                         <a href="Leads.html" class="btn btn-outline btn-sm">View All Leads</a>
                    </header>
                    <div class="lead-grid" id="marketLeads">
                        <!-- Marketplace leads injected here -->
                    </div>
                </div>
            </div>
 
            <div id="cabinetView" style="display: none;">
                <div class="glass" style="padding: clamp(1.5rem, 5vw, 2.5rem);">
                    <h3 style="margin-bottom: 1.5rem;">My Cabinet (Acquired Leads)</h3>
                    <div class="lead-grid" id="purchasedLeads">
                        <!-- Cabinet leads injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer id="main-footer"></footer>

    <script type="module">
        import Storage from './js/storage.js';
        import Taxgini from './js/function.js';
        import LeadsVault from './js/leadsvault.js';

        const user = Taxgini.checkSession();
        if (!user || user.type !== 'ca') {
            window.location.href = 'login.html';
        }

        // Initialize UI with user data
        document.getElementById('welcomeUser').textContent = `${user.name}'s Dashboard`;
        document.getElementById('profileImg').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=00c853&color=fff`;
        if (user.licenseNo) {
            document.getElementById('caLicense').textContent = user.licenseNo;
        }

        document.getElementById('logoutBtn').onclick = () => Taxgini.logout();

        const marketView = document.getElementById('marketplaceView');
        const cabinetView = document.getElementById('cabinetView');
        
        // Navigation logic for Dashboard links (since we consolidated)
        const marketLeadsContainer = document.getElementById('marketLeads');
        const purchasedLeadsContainer = document.getElementById('purchasedLeads');
        const availCountElem = document.getElementById('availCount');
        const walletBalanceElem = document.getElementById('walletBalance');
        const walletSideElem = document.getElementById('walletSide');

        function updateUI() {
            // Get freshest user data
            const currentUser = Storage.getCurrentUser();
            const availLeads = Storage.getAvailableLeads();
            const purchasedLeads = Storage.getPurchasedLeads();
            
            availCountElem.textContent = availLeads.length;
            walletBalanceElem.textContent = `₹${currentUser.wallet.toLocaleString()}`;
            walletSideElem.textContent = `₹${currentUser.wallet.toLocaleString()}`;

            // Use LeadsVault to render marketplace preview
            LeadsVault.renderMarketplace('marketLeads');

            // Render Cabinet (Purchased Leads)
            purchasedLeadsContainer.innerHTML = purchasedLeads.map(lead => `
                <div class="glass lead-card fade-in" style="padding: 1.5rem; display: block; border-left: 4px solid var(--success);">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                        <div>
                            <span class="lead-badge" style="background: rgba(0, 200, 83, 0.1); color: var(--success); margin-bottom: 0.5rem; display: inline-block;">UNLOCKED</span>
                            <h4>${lead.serviceType}</h4>
                            <p style="font-size: 0.9rem; color: var(--secondary); font-weight: 600;">Client: ${lead.clientName}</p>
                        </div>
                        <div style="text-align: right;">
                            <a href="mailto:${lead.clientEmail}" class="btn btn-primary btn-sm"><i class="fas fa-paper-plane"></i> Contact Now</a>
                        </div>
                    </div>
                    <div style="background: rgba(0,0,0,0.2); border-radius: 0.5rem; padding: 1rem; margin-top: 1rem;">
                        <h5 style="margin-bottom: 0.5rem; color: var(--success);"><i class="fas fa-address-book"></i> Contact Details</h5>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 1rem;">
                            <span><i class="fas fa-phone" style="width: 20px;"></i> ${lead.clientPhone}</span>
                            <span><i class="fas fa-envelope" style="width: 20px;"></i> ${lead.clientEmail}</span>
                        </div>
                    </div>
                    <div style="margin-top: 1rem; font-size: 0.85rem; color: var(--text-secondary);">
                        Purchased on: ${new Date(lead.purchasedAt).toLocaleString()}
                    </div>
                </div>
            `).join('') || '<div style="text-align: center; color: var(--text-secondary);">You haven\'t unlocked any leads yet.</div>';
        }

        updateUI();
    </script>
</body>
</html>
